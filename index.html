  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeema</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #F9F0EE;
        color: #111;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        text-align: center;
      }
      .tortoise {
        width: 140px;
        height: 140px;
        object-fit: contain;
        margin-bottom: 24px;
      }
      .wordmark {
        font-size: 64px;
        font-weight: 900;
        font-style: italic;
        letter-spacing: -1px;
        margin-bottom: 16px;
      }
      .wip {
        font-size: 13px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #888;
      }
      footer {
        font-size: 12px;
        color: #999;
        margin-top: auto;
        padding-top: 40px;
      }
      footer a { color: #555; text-decoration: none; }
      footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <img class="tortoise" src="tortoise.png" alt="Jeema mascot" />
    <div class="wordmark">JEEMA</div>
    <p class="wip">Website coming soon</p>
    <footer>
      &copy; 2026 Jeema &nbsp;&bull;&nbsp;
      <a href="/privacy.html">Privacy Policy</a>
    </footer>
  </body>
  </html>
