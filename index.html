  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeema — Run. Compete. Rise.</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #F9F0EE;
        color: #111;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
      }
      .wordmark {
        font-size: 64px;
        font-weight: 900;
        font-style: italic;
        letter-spacing: -1px;
        margin-bottom: 12px;
      }
      .tagline {
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #555;
        margin-bottom: 48px;
      }
      .badge {
        display: inline-block;
        background: #111;
        color: #F9F0EE;
        padding: 14px 32px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        margin-bottom: 48px;
      }
      .badge:hover { opacity: 0.85; }
      footer {
        font-size: 12px;
        color: #999;
        margin-top: auto;
        padding-top: 40px;
      }
      footer a { color: #555; text-decoration: none; }
      footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="wordmark">JEEMA</div>
    <p class="tagline">Run &middot; Compete &middot; Rise</p>
    <a class="badge" href="https://apps.apple.com/app/jeema">Download on the App Store</a>
